name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://techrupt.me
          NEXT_PUBLIC_SITE_NAME: Techrupt
          # Newsletter and analytics keys are not needed at build time
          # but BEEHIIV_* and PLAUSIBLE_* should be set in GitHub Secrets for prod
